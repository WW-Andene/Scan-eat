openapi: 3.1.0
info:
  title: ScanEat API
  version: 0.5.0
paths:
  /api/score:
    post:
      summary: Score a barcode, uploaded images, or a client-provided product.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScoreRequest'
      responses:
        '200':
          description: Scored product and audit metadata.
        '400':
          description: Invalid barcode, image payload, MIME type, or JSON body.
        '413':
          description: Request body too large.
        '503':
          description: LLM path unavailable because GROQ_API_KEY is not configured.
  /api/identify:
    post:
      summary: Identify a single food from one or more images.
      requestBody:
        $ref: '#/components/requestBodies/ImageScan'
      responses:
        '200': { description: Identified food. }
        '400': { description: Invalid or missing images. }
  /api/identify-multi:
    post:
      summary: Identify multiple foods from one or more images.
      requestBody:
        $ref: '#/components/requestBodies/ImageScan'
      responses:
        '200': { description: Identified food list. }
        '400': { description: Invalid or missing images. }
  /api/identify-menu:
    post:
      summary: Extract restaurant menu items from one or more images.
      requestBody:
        $ref: '#/components/requestBodies/ImageScan'
      responses:
        '200': { description: Identified menu items. }
        '400': { description: Invalid or missing images. }
  /api/identify-recipe:
    post:
      summary: Extract a recipe from one or more images.
      requestBody:
        $ref: '#/components/requestBodies/ImageScan'
      responses:
        '200': { description: Identified recipe. }
        '400': { description: Invalid or missing images. }
  /api/suggest-recipes:
    post:
      summary: Suggest recipes from an ingredient query.
      responses:
        '200': { description: Recipe suggestions. }
  /api/suggest-from-pantry:
    post:
      summary: Suggest recipes from pantry ingredients.
      responses:
        '200': { description: Recipe suggestions. }
  /api/fetch-recipe:
    post:
      summary: Fetch and parse a recipe URL.
      responses:
        '200': { description: Parsed recipe. }
components:
  requestBodies:
    ImageScan:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              images:
                type: array
                maxItems: 4
                items:
                  $ref: '#/components/schemas/ImagePayload'
              imageBase64:
                type: string
              mime:
                type: string
            anyOf:
              - required: [images]
              - required: [imageBase64]
  schemas:
    ImagePayload:
      type: object
      required: [base64]
      properties:
        base64:
          type: string
          maxLength: 3500000
          pattern: '^[A-Za-z0-9+/]+={0,2}$'
        mime:
          type: string
          enum: [image/jpeg, image/png, image/webp, image/heic, image/heif]
          default: image/jpeg
    ScoreRequest:
      type: object
      properties:
        images:
          type: array
          maxItems: 4
          items:
            $ref: '#/components/schemas/ImagePayload'
        imageBase64:
          type: string
        mime:
          type: string
        barcode:
          type: string
          pattern: '^(?:\\d{8}|\\d{12,14})$'
        product:
          type: object
        preferences:
          type: object
          properties:
            diets:
              type: array
              items: { type: string }
            allergens:
              type: array
              items: { type: string }
