version: "3.9"

services:
  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GROQ_API_KEY=${GROQ_API_KEY}    # optional — client can pass X-Groq-Key instead
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
