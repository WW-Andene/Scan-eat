# DEAD CONFIG - not loaded by anything. Application.kt's main() starts the
# server via embeddedServer(Netty, port = System.getenv("PORT")..., module =
# Application::module) directly, not EngineMain/HoconApplicationConfig, so
# nothing in this file (including the `ktor {}` block below) is ever read.
# The values under `scanneat {}` are the exact same endpoints/timeouts/limits
# hardcoded in GroqService.kt, OffService.kt, and RouteHelpers.kt - editing
# this file has zero effect; change those constants instead.
ktor {
  deployment {
    port = 8080
    port = ${?PORT}
  }
  application {
    modules = [ fr.scanneat.ApplicationKt.module ]
  }
}

scanneat {
  groq {
    endpoint  = "https://api.groq.com/openai/v1/chat/completions"
    model     = "meta-llama/llama-4-scout-17b-16e-instruct"
    fallback  = "llama-3.3-70b-versatile"
    timeoutMs = 30000
  }
  off {
    endpoint  = "https://world.openfoodfacts.org/api/v2/product"
    timeoutMs = 4000
  }
  limits {
    maxBodyBytes = 12582912  # 12 MB
  }
}
